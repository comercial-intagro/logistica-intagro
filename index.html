        const formatDateDisplay = (dateStr) => {
            if (!dateStr) return '';
            if (dateStr.includes('/')) return dateStr;
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        };

        // Formatea un timestamp ISO a "DD/MM/YYYY HH:mm"
        const formatDateTimeDisplay = (iso) => {
            if (!iso) return '';
            const dt = new Date(iso);
            if (isNaN(dt.getTime())) return '';
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
        };

        // Funciones para calcular Vigente, Vencido y Futuro
        const parseDate = (dateStr) => {
            if (!dateStr) return null;
            if (dateStr.includes('-')) {
                const [y, m, d] = dateStr.split('-');
                return new Date(y, m - 1, d);
            }
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                let year = parseInt(parts[2]);
                if (year < 100) year += 2000;
                return new Date(year, parseInt(parts[1]) - 1, parseInt(parts[0]));
            }
            return new Date(dateStr);
        };

        const getContractStatus = (desde, hasta) => {
            const today = new Date();
            today.setHours(0,0,0,0);
            const dDesde = parseDate(desde);
            const dHasta = parseDate(hasta);
            if (!dDesde || !dHasta) return 'Vigente'; 
            if (today > dHasta) return 'Vencido';
            if (today < dDesde) return 'Futuro';
            return 'Vigente';

        async function hashPassword(plain) {
            const enc = new TextEncoder().encode(plain + '::intagro_salt_v1');
            const buf = await crypto.subtle.digest('SHA-256', enc);
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

            kilosPactados: Number(c.kilos_pactados || 0),
            kgEntregados: Number(c.kg_entregados || 0),
            kgFalta: Number(c.kg_falta_entregar || 0),

            precio: c.precio || '',
            destino: c.destino || '',
            cosecha: c.cosecha || '',

            cuitVendedor: c.cuit_vendedor || '',

            repreVendedor: c.repre_vendedor || ''
        });

        // ====================================================================
        // HOOK: useSupabaseTable
        // Lee una tabla, se suscribe a cambios en realtime, y devuelve los datos.
        // ====================================================================
        function useSupabaseTable(tableName, mapper, options = {}) {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const reload = async () => {
                try {
                    let query = sb.from(tableName).select('*');
                    if (options.orderBy) query = query.order(options.orderBy, { ascending: options.ascending !== false });
                    const { data: rows, error: err } = await query;
                    if (err) throw err;
                    setData((rows || []).map(mapper));
                    setError(null);
                } catch (e) {
                    setError(e.message);
                    console.error('Error loading ' + tableName, e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                reload();
                const channel = sb.channel('rt_' + tableName)
                    .on('postgres_changes', { event: '*', schema: 'public', table: tableName }, () => reload())
                    .subscribe();
                return () => { sb.removeChannel(channel); };
            }, [tableName]);

            return [data, reload, loading, error];
        }

        // ====================================================================
        // HOOK: useBuyerQuotas
        // Lee buyer_quotas + sus alfanuméricos en una sola operación.
        // Necesita su propio hook porque hace un join lógico.
        // ====================================================================
        function useBuyerQuotas() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            const reload = async () => {
                try {
                    const [quotasRes, alfasRes] = await Promise.all([
                        sb.from('buyer_quotas').select('*').order('created_at', { ascending: false }),
                        sb.from('quota_alfanumericos').select('*')
                    ]);
                    if (quotasRes.error) throw quotasRes.error;
                    if (alfasRes.error) throw alfasRes.error;
                    const alfasByQuota = {};
                    (alfasRes.data || []).forEach(a => {
                        if (!alfasByQuota[a.buyer_quota_id]) alfasByQuota[a.buyer_quota_id] = [];
                        alfasByQuota[a.buyer_quota_id].push(a);
                    });
                    setData((quotasRes.data || []).map(q => mapBuyerQuotaFromDb(q, alfasByQuota[q.id] || [])));
                } catch (e) {
                    console.error('Error loading buyer_quotas', e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                reload();
                const ch1 = sb.channel('rt_buyer_quotas')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'buyer_quotas' }, () => reload())
                    .subscribe();
                const ch2 = sb.channel('rt_quota_alfas')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'quota_alfanumericos' }, () => reload())
                    .subscribe();
                return () => { sb.removeChannel(ch1); sb.removeChannel(ch2); };
            }, []);

            return [data, reload, loading];
        }

        // COMPONENTE FILA PARA FORMULARIO COMPACTO (ESTILO CARTA DE PORTE)
        // Select que tolera valores guardados que ya no están en la lista de opciones
        // (ej: plantillas viejas con formato "CUIT - Descripción"). Si el valor no existe
        // entre las opciones, lo agrega para que no se pierda el dato.
        const TolerantSelect = ({ value, onChange, options, className, placeholder = 'Seleccionar...' }) => {
            const opts = useMemo(() => {
                const base = (options || []).filter(Boolean);
                const v = (value || '').toString();
                if (v && !base.some(o => o === v)) return [v, ...base];
                return base;
            }, [options, value]);
            return (
                <select className={className} value={value || ''} onChange={onChange}>
                    <option value="">{placeholder}</option>
                    {opts.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
            );
        };

                 return localAlfas.filter(a => a.code.toLowerCase().includes(searchTerm.toLowerCase()));

             const toggleAll = (e) => {
                 if (e.target.checked) {
                     const filteredCodes = filteredAlfas.map(a => a.code);
                     setSelected(Array.from(new Set([...selected, ...filteredCodes])));

                     const filteredCodes = filteredAlfas.map(a => a.code);

        // --- COMPONENTE CÓDIGO QR REALISTA ---
        const QRCodeDummy = () => {
            const size = 25; // Matriz 25x25 (Tamaño estándar de QR)
            const cells = [];
            
            // Semilla pseudoaleatoria fija para que el QR sea siempre el mismo y parezca un documento estático
            const pseudoRandom = (seed) => {
                const x = Math.sin(seed) * 10000;
                return x - Math.floor(x);
            };

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    let isBlack = false;

                    // Patrón de búsqueda: Arriba-Izquierda (7x7)
                    if (r < 7 && c < 7) {
                        if (r === 0 || r === 6 || c === 0 || c === 6) isBlack = true; // Borde exterior
                        else if (r >= 2 && r <= 4 && c >= 2 && c <= 4) isBlack = true; // Cuadrado interior
                    }
                    // Patrón de búsqueda: Arriba-Derecha (7x7)
                    else if (r < 7 && c >= size - 7) {
                        let lc = c - (size - 7);
                        if (r === 0 || r === 6 || lc === 0 || lc === 6) isBlack = true;
                        else if (r >= 2 && r <= 4 && lc >= 2 && lc <= 4) isBlack = true;
                    }
                    // Patrón de búsqueda: Abajo-Izquierda (7x7)
                    else if (r >= size - 7 && c < 7) {
                        let lr = r - (size - 7);
                        if (lr === 0 || lr === 6 || c === 0 || c === 6) isBlack = true;
                        else if (lr >= 2 && lr <= 4 && c >= 2 && c <= 4) isBlack = true;
                    } 
                    // Datos aleatorios del cuerpo del QR
                    else {
                        isBlack = pseudoRandom(r * size + c + 42) > 0.5;
                    }

                    if (isBlack) {
                        cells.push(<rect key={`${r}-${c}`} x={c * 4} y={r * 4} width="4" height="4" fill="black" />);
                    }
                }
            }

            return (
                <div className="w-[50px] h-[50px] border border-black p-[2px] bg-white flex items-center justify-center shrink-0">
                    <svg viewBox={`0 0 ${size * 4} ${size * 4}`} className="w-full h-full" shapeRendering="crispEdges">
                        {cells}
                    </svg>
                </div>
            );
        };

        function ABMModal({ onClose, destinos, reloadDestinos, intervinientes, reloadIntervinientes, clientes, reloadClientes, cpTemplates, reloadTemplates, saveTemplate, productos, currentUser }) {
            const [tab, setTab] = useState('destinos');
            return (
                <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                    <div className="bg-slate-100 rounded-xl shadow-2xl w-full max-w-7xl h-[90vh] flex flex-col overflow-hidden">
                        {/* Cabecera */}
                        <div className="bg-gradient-to-r from-emerald-900 to-emerald-700 text-white px-5 py-3 flex justify-between items-center shrink-0">
                            <h2 className="font-bold text-base flex items-center gap-2"><Icons.Database className="w-5 h-5"/> ABM — Administración de Tablas</h2>
                            <button onClick={onClose} className="hover:text-emerald-200 transition"><Icons.X className="w-6 h-6"/></button>
                        </div>
                        {/* Solapas */}
                        <div className="flex gap-1 px-4 pt-3 bg-slate-200/60 shrink-0">
                            {[['destinos','Destinos'],['plantillas','Plantillas Carta de Porte'],['intervinientes','Intervinientes'],['clientes','Clientes'],['usuarios','Usuarios']].map(([k,label]) => (
                                <button key={k} onClick={()=>setTab(k)} className={`px-4 py-2 rounded-t-lg text-sm font-bold transition ${tab===k ? 'bg-slate-100 text-emerald-800 shadow-sm' : 'bg-slate-300/50 text-slate-500 hover:bg-slate-300'}`}>{label}</button>
                            ))}
                        </div>
                        {/* Contenido */}
                        <div className="flex-1 overflow-hidden bg-slate-100 p-4">
                            {tab==='destinos' && <ABMDestinos destinos={destinos} reload={reloadDestinos} productos={productos} />}
                            {tab==='intervinientes' && <ABMIntervinientes intervinientes={intervinientes} reload={reloadIntervinientes} />}
                            {tab==='clientes' && <ABMClientes clientes={clientes} reload={reloadClientes} />}
                            {tab==='usuarios' && <ABMUsuarios currentUser={currentUser} clientes={clientes} />}
                            {tab==='plantillas' && <ABMPlantillas cpTemplates={cpTemplates} reloadTemplates={reloadTemplates} saveTemplate={saveTemplate} />}
                        </div>
                    </div>
                </div>
            );
        }

        // --- Solapa Destinos ---
        function ABMDestinos({ destinos, reload, productos }) {
            const empty = { idDestino:'', cuit:'', descripcion:'', codigoPlanta:'', direccion:'', localidad:'', provincia:'', producto:'', zonaComercial:'', subZonaComercial:'' };
            const [form, setForm] = useState(empty);
            const [editId, setEditId] = useState(null);
            const [search, setSearch] = useState('');
            const fileRef = useRef(null);

            const ch = (k,v) => setForm(f => ({...f,[k]:v}));

            const toDb = (f) => ({
                id_destino: f.idDestino||null,
                cuit: f.cuit||null, descripcion: (f.descripcion||'').trim(), codigo_planta: f.codigoPlanta||null,
                direccion: f.direccion||null, localidad: f.localidad||null, provincia: f.provincia||null,
                producto: (f.producto||'').toUpperCase()||null, zona_comercial: f.zonaComercial||null, sub_zona_comercial: f.subZonaComercial||null
            });

            const save = async () => {
                if (!form.descripcion.trim()) return alert('La descripción es obligatoria.');
                try {
                    if (editId) {
                        const { error } = await sb.from('destinos').update(toDb(form)).eq('id', editId);
                        if (error) throw error;
                    } else {
                        const { error } = await sb.from('destinos').insert(toDb(form));
                        if (error) throw error;
                    }
                    setForm(empty); setEditId(null); reload();
                } catch(e){ alert('Error: '+e.message); }
            };

            const edit = (d) => { setForm({...d}); setEditId(d.id); };
            const del = async (id) => {
                if(!window.confirm('¿Eliminar este destino?')) return;
                try { const { error } = await sb.from('destinos').delete().eq('id', id); if (error) throw error; reload(); }
                catch(e){ alert('Error: '+e.message); }
            };

            const exportXlsx = () => {
                const data = destinos.map(d => ({
                    'ID Destino': d.idDestino, CUIT: d.cuit, Descripcion: d.descripcion, 'Codigo Planta': d.codigoPlanta, Direccion: d.direccion,
                    Localidad: d.localidad, Provincia: d.provincia, Producto: d.producto, 'Zona Comercial': d.zonaComercial, 'Sub Zona Comercial': d.subZonaComercial
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Destinos');
                XLSX.writeFile(wb, 'destinos.xlsx');
            };

            const importXlsx = async (e) => {
                const file = e.target.files[0]; e.target.value=''; if(!file) return;
                try {
                    const buf = await file.arrayBuffer();
                    const wb = XLSX.read(buf, {type:'array'});
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
                    const norm = (r, ...keys) => { for(const k of keys){ const found = Object.keys(r).find(x=>x.toLowerCase().trim()===k.toLowerCase()); if(found) return (r[found]||'').toString().trim(); } return ''; };
                    const toInsert = rows.map(r => ({
                        id_destino: norm(r,'id destino','id_destino','iddestino')||null,
                        cuit: norm(r,'cuit')||null,
                        descripcion: norm(r,'descripcion','descripción')||'(sin descripción)',
                        codigo_planta: norm(r,'codigo planta','código planta','codigo de planta')||null,
                        direccion: norm(r,'direccion','dirección')||null,
                        localidad: norm(r,'localidad')||null,
                        provincia: norm(r,'provincia')||null,
                        producto: (norm(r,'producto')||'').toUpperCase()||null,
                        zona_comercial: norm(r,'zona comercial')||null,
                        sub_zona_comercial: norm(r,'sub zona comercial')||null
                    }));
                    if(toInsert.length===0) return alert('El archivo no tiene filas.');
                    const { error } = await sb.from('destinos').insert(toInsert);
                    if (error) throw error;
                    alert(`${toInsert.length} destinos importados.`); reload();
                } catch(err){ alert('Error al importar: '+err.message); }
            };

            const filtered = destinos.filter(d => {
                if(!search) return true;
                const t = search.toLowerCase();
                return (d.descripcion||'').toLowerCase().includes(t) || (d.cuit||'').toLowerCase().includes(t) || (d.producto||'').toLowerCase().includes(t) || (d.codigoPlanta||'').toLowerCase().includes(t) || (d.idDestino||'').toLowerCase().includes(t);
            });

            return (
                <div className="h-full flex flex-col gap-3">
                    {/* Formulario */}
                    <div className="bg-white rounded-lg border border-slate-200 p-3 shrink-0">
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-2">
                            <input placeholder="ID Destino (interno)" value={form.idDestino} onChange={e=>ch('idDestino',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="CUIT (xx-xxxxxxxx-x)" value={form.cuit} onChange={e=>ch('cuit',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="Descripción *" value={form.descripcion} onChange={e=>ch('descripcion',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="Código de Planta" value={form.codigoPlanta} onChange={e=>ch('codigoPlanta',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="Dirección" value={form.direccion} onChange={e=>ch('direccion',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="Localidad" value={form.localidad} onChange={e=>ch('localidad',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="Provincia" value={form.provincia} onChange={e=>ch('provincia',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <select value={form.producto} onChange={e=>ch('producto',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500 bg-white"><option value="">Producto...</option><option value="TODOS">TODOS</option>{productos.map(p=><option key={p} value={p}>{p}</option>)}</select>
                            <input placeholder="Zona Comercial" value={form.zonaComercial} onChange={e=>ch('zonaComercial',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <input placeholder="Sub Zona Comercial" value={form.subZonaComercial} onChange={e=>ch('subZonaComercial',e.target.value)} className="p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                            <div className="flex gap-1">
                                <button onClick={save} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded px-3 py-1.5 transition">{editId?'Guardar':'Agregar'}</button>
                                {editId && <button onClick={()=>{setForm(empty);setEditId(null);}} className="bg-slate-200 hover:bg-slate-300 text-slate-600 text-xs font-bold rounded px-2 transition">✕</button>}
                            </div>
                        </div>
                    </div>
                    {/* Barra de acciones */}
                    <div className="flex items-center gap-2 shrink-0">
                        <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 max-w-xs p-1.5 border border-slate-300 rounded text-xs outline-none focus:border-emerald-500" />
                        <span className="text-xs text-slate-500">{filtered.length} registros</span>
                        <div className="flex-1"></div>
                        <button onClick={()=>fileRef.current?.click()} className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded px-3 py-1.5 transition"><Icons.Upload className="w-3.5 h-3.5"/> Importar .xlsx</button>
                        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={importXlsx} className="hidden" />
                        <button onClick={exportXlsx} className="flex items-center gap-1.5 bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold rounded px-3 py-1.5 transition"><Icons.Download className="w-3.5 h-3.5"/> Exportar .xlsx</button>
                    </div>
                    {/* Tabla */}
                    <div className="flex-1 overflow-auto custom-scroll bg-white rounded-lg border border-slate-200">
                        <table className="w-full text-left border-collapse text-xs">
                            <thead className="sticky top-0 bg-slate-100 z-10">
                                <tr>
                                    {['ID Destino','CUIT','Descripción','Cód. Planta','Dirección','Localidad','Provincia','Producto','Zona Com.','Sub Zona','Acc.'].map(h=><th key={h} className="p-2 font-bold text-slate-600 border-b border-slate-200 whitespace-nowrap">{h}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map(d => (
                                    <tr key={d.id} className="even:bg-slate-50 hover:bg-emerald-50 transition">
                                        <td className="p-2 border-b border-slate-100 font-bold text-indigo-700">{d.idDestino}</td>
                                        <td className="p-2 border-b border-slate-100">{d.cuit}</td>
                                        <td className="p-2 border-b border-slate-100 font-bold text-slate-700">{d.descripcion}</td>
                                        <td className="p-2 border-b border-slate-100">{d.codigoPlanta}</td>
                                        <td className="p-2 border-b border-slate-100">{d.direccion}</td>
                                        <td className="p-2 border-b border-slate-100">{d.localidad}</td>
                                        <td className="p-2 border-b border-slate-100">{d.provincia}</td>
                                        <td className="p-2 border-b border-slate-100"><span className="bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded font-bold">{d.producto}</span></td>
                                        <td className="p-2 border-b border-slate-100">{d.zonaComercial}</td>

        function LoginScreen({ onLogin, needsFirstAnalyst, onCreateFirst }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            // Campos para crear primer analista
            const [newUser, setNewUser] = useState('');
            const [newPass, setNewPass] = useState('');
            const [newNombre, setNewNombre] = useState('');

            const doLogin = async () => {
                setError(''); setLoading(true);
                try {
                    const { data, error: err } = await sb.from('usuarios').select('*').ilike('username', username.trim()).limit(1);
                    if (err) throw err;
                    if (!data || data.length === 0) { setError('Usuario o contraseña incorrectos.'); setLoading(false); return; }
                    const u = data[0];
                    if (u.activo === false) { setError('Usuario desactivado. Contactá al analista.'); setLoading(false); return; }
                    const hash = await hashPassword(password);
                    if (hash !== u.password_hash) { setError('Usuario o contraseña incorrectos.'); setLoading(false); return; }
                    setLoading(false);
                    onLogin(mapUsuarioFromDb(u));
                } catch(e) { setError('Error: ' + e.message); setLoading(false); }
            };

            const createFirst = async () => {
                setError('');
                if (!newUser.trim() || !newPass.trim()) { setError('Usuario y contraseña son obligatorios.'); return; }
                setLoading(true);
                try {
                    const hash = await hashPassword(newPass);
                    const { error: err } = await sb.from('usuarios').insert({
                        username: newUser.trim(), password_hash: hash, rol: 'analista', nombre_completo: newNombre.trim() || newUser.trim(), activo: true
                    });
                    if (err) throw err;
                    alert('Analista creado. Ahora podés iniciar sesión.');
                    setLoading(false);
                    onCreateFirst();
                } catch(e) { setError('Error: ' + e.message); setLoading(false); }
            };

            if (needsFirstAnalyst) {
                return (
                    <div className="h-screen flex items-center justify-center bg-gradient-to-br from-emerald-900 to-emerald-700 p-4">
                        <div className="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
                            <h1 className="text-xl font-black text-emerald-900 mb-1">Configuración inicial</h1>
                            <p className="text-sm text-slate-500 mb-5">No hay usuarios todavía. Creá el primer usuario <b>analista</b> (administrador).</p>
                            <div className="space-y-3">
                                <input placeholder="Usuario (ej: ADMIN)" value={newUser} onChange={e=>setNewUser(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:border-emerald-500" />
                                <input placeholder="Nombre completo (opcional)" value={newNombre} onChange={e=>setNewNombre(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:border-emerald-500" />
                                <input type="password" placeholder="Contraseña" value={newPass} onChange={e=>setNewPass(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:border-emerald-500" />
                                {error && <p className="text-sm text-red-600">{error}</p>}
                                <button onClick={createFirst} disabled={loading} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg transition disabled:opacity-50">{loading?'Creando...':'Crear analista'}</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex items-center justify-center bg-gradient-to-br from-emerald-900 to-emerald-700 p-4">
                    <div className="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
                        <div className="flex items-center gap-3 mb-1">
                            <div className="bg-emerald-700 p-2 rounded-lg"><Icons.Layers className="w-5 h-5 text-white"/></div>
                            <h1 className="text-lg font-black text-emerald-900 leading-tight">GESTIÓN DE LOGÍSTICA<br/><span className="text-xs font-bold text-slate-400">INTAGRO SA</span></h1>
                        </div>
                        <p className="text-sm text-slate-500 mb-5 mt-3">Ingresá con tu usuario y contraseña.</p>
                        <div className="space-y-3">
                            <input placeholder="Usuario" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:border-emerald-500" />
                            <input type="password" placeholder="Contraseña" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:border-emerald-500" />
                            {error && <p className="text-sm text-red-600">{error}</p>}
                            <button onClick={doLogin} disabled={loading} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg transition disabled:opacity-50">{loading?'Ingresando...':'Ingresar'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            // SESIÓN
            const [currentUser, setCurrentUser] = useState(null);
            const [authChecked, setAuthChecked] = useState(false);
            const [needsFirstAnalyst, setNeedsFirstAnalyst] = useState(false);

            // Al cargar, ver si hay sesión guardada y si existe al menos un usuario
            useEffect(() => {
                (async () => {
                    try {
                        const saved = sessionStorage.getItem('intagro_user');
                        if (saved) { setCurrentUser(JSON.parse(saved)); setAuthChecked(true); return; }
                    } catch(e) {}
                    try {
                        const { count } = await sb.from('usuarios').select('*', { count: 'exact', head: true });
                        setNeedsFirstAnalyst((count || 0) === 0);
                    } catch(e) { console.error('Error verificando usuarios', e); }
                    setAuthChecked(true);
                })();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                try { sessionStorage.setItem('intagro_user', JSON.stringify(user)); } catch(e) {}
            };
            const handleLogout = () => {
                setCurrentUser(null);
                try { sessionStorage.removeItem('intagro_user'); } catch(e) {}
            };

            // ESTADOS GLOBALES DESDE SUPABASE
            const [requests, reloadRequests, loadingReq] = useSupabaseTable('requests', mapRequestFromDb, { orderBy: 'timestamp_form', ascending: false });
            const [buyerQuotas, reloadBuyerQuotas, loadingBQ] = useBuyerQuotas();
            const [assignedQuotas, reloadAssigned, loadingAsg] = useSupabaseTable('assigned_quotas', mapAssignedFromDb, { orderBy: 'assigned_at', ascending: false });
            const [cpTemplates, reloadTemplates] = useSupabaseTable('cp_templates', mapTemplateFromDb, { orderBy: 'name', ascending: true });
            const [destinos, reloadDestinos] = useSupabaseTable('destinos', mapDestinoFromDb, { orderBy: 'descripcion', ascending: true });
            const [intervinientes, reloadIntervinientes] = useSupabaseTable('intervinientes', mapIntervinienteFromDb, { orderBy: 'descripcion', ascending: true });
            const [clientes, reloadClientes] = useSupabaseTable('clientes', mapClienteFromDb, { orderBy: 'cliente', ascending: true });
            const [contratos, reloadContratos] = useSupabaseTable('contratos', mapContratoFromDb, { orderBy: 'nro_contrato', ascending: true });
            
            // Rol y filtrado de datos según usuario (calculado siempre, antes de cualquier return)
            const isAnalista = currentUser?.rol === 'analista';
            const misClientes = useMemo(() => {
                if (!currentUser || isAnalista) return null;
                const mine = (currentUser.nombreCompleto || '').trim().toUpperCase();
                return new Set(clientes.filter(c => (c.repreComercial || '').trim().toUpperCase() === mine).map(c => (c.cliente || '').toUpperCase()));
            }, [currentUser, isAnalista, clientes]);
            const visibleRequests = useMemo(() => {
                if (!currentUser || isAnalista) return requests;
                return requests.filter(r => misClientes.has((r.clientName || '').toUpperCase()));
            }, [requests, currentUser, isAnalista, misClientes]);
            const visibleAssigned = useMemo(() => {
                if (!currentUser || isAnalista) return assignedQuotas;
                return assignedQuotas.filter(q => misClientes.has((q.clientName || '').toUpperCase()));
            }, [assignedQuotas, currentUser, isAnalista, misClientes]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showABM, setShowABM] = useState(false);

            const isLoading = loadingReq || loadingBQ || loadingAsg;

            const [contratosProcessing, setContratosProcessing] = useState(false);
            const [contratosProgress, setContratosProgress] = useState(0);
            const handleContratosUpload = async (event) => {
                const file = event.target.files[0];
                event.target.value = '';
                if (!file) return;
                if (!window.confirm('La importación REEMPLAZA todos los contratos actuales por los del archivo. ¿Continuar?')) return;
                setContratosProcessing(true);
                setContratosProgress(0);
                try {
                    const buffer = await file.arrayBuffer();
                    const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

                    // Buscar la fila de encabezados (la que contiene 'NroCtrat')
                    let headerIdx = -1;
                    for (let i = 0; i < Math.min(rows.length, 15); i++) {
                        if (rows[i].some(c => (c || '').toString().trim() === 'NroCtrat')) { headerIdx = i; break; }
                    }
                    if (headerIdx === -1) { alert('No se encontró la columna "NroCtrat". ¿Es el Excel de PendienteEntregas?'); setContratosProcessing(false); return; }

                    const headers = rows[headerIdx].map(h => (h || '').toString().trim());
                    const col = (name) => headers.indexOf(name);
                    const idx = {
                        nro: col('NroCtrat'), fop: col('FechaOperacion'), vend: col('RsocialVendedor'), comp: col('RsocialComprador'),
                        proc: col('Procedencia'), desde: col('FechaDeEntregaDesde'), hasta: col('FechaDeEntregaHasta'), merc: col('Mercaderia'),
                        kpact: col('KilosPactados'), kentr: col('KgEntregados'), kfalta: col('KgFaltaEntregar'), tipo: col('DescTipoCtrat'),
                        precio: col('Precio'), dest: col('Destino'), cos: col('CosechaAsString'), cuitc: col('CuitComprador'),
                        cuitv: col('CuitVendedor'), obs: col('Observaciones'), mon: col('Moneda'), cg: col('CartaGarantia'), repv: col('RepreVendedor')
                    };

                    const toDate = (v) => {
                        if (!v) return null;
                        if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
                        const s = v.toString().trim();
                        if (!s || s === '00:00:00') return null;
                        // formato YYYY-MM-DD HH:MM:SS
                        const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
                        if (m) return `${m[1]}-${m[2]}-${m[3]}`;
                        return null;
                    };
                    const txt = (r, i) => i >= 0 ? (r[i] || '').toString().trim() : '';
                    const num = (r, i) => { const n = parseFloat((r[i] || '').toString().replace(',','.')); return isNaN(n) ? 0 : n; };

                    const records = [];
                    for (let i = headerIdx + 1; i < rows.length; i++) {
                        const r = rows[i];
                        const nro = txt(r, idx.nro);
                        if (!nro) continue;
                        records.push({
                            nro_contrato: nro,
                            fecha_operacion: toDate(r[idx.fop]),
                            cliente: txt(r, idx.vend),
                            comprador: txt(r, idx.comp),
                            procedencia: txt(r, idx.proc),
                            fecha_entrega_desde: toDate(r[idx.desde]),
                            fecha_entrega_hasta: toDate(r[idx.hasta]),
                            producto: txt(r, idx.merc),
                            kilos_pactados: num(r, idx.kpact),
                            kg_entregados: num(r, idx.kentr),
                            kg_falta_entregar: num(r, idx.kfalta),
                            tipo_contrato: txt(r, idx.tipo),
                            precio: txt(r, idx.precio),
                            destino: txt(r, idx.dest),
                            cosecha: txt(r, idx.cos),
                            cuit_comprador: txt(r, idx.cuitc),
                            cuit_vendedor: txt(r, idx.cuitv),
                            observaciones: txt(r, idx.obs),
                            moneda: txt(r, idx.mon),
                            carta_garantia: txt(r, idx.cg),
                            repre_vendedor: txt(r, idx.repv)
                        });
                    }

                    if (records.length === 0) { alert('No se encontraron contratos en el archivo.'); setContratosProcessing(false); return; }

                    // Reemplazo total: borrar todo y reinsertar
                    const { error: delErr } = await sb.from('contratos').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    if (delErr) throw delErr;

                    // Insertar en lotes pequeños con reintentos y espera creciente (backoff)
                    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
                    const LOTE = 50;
                    let insertados = 0;
                    const totalLotes = Math.ceil(records.length / LOTE);
                    for (let i = 0; i < records.length; i += LOTE) {
                        const lote = records.slice(i, i + LOTE);
                        const nroLote = Math.floor(i / LOTE) + 1;
                        let ok = false, intentos = 0, ultimoError = null;
                        while (!ok && intentos < 6) {
                            intentos++;
                            try {
                                const { error } = await sb.from('contratos').insert(lote);
                                if (error) { ultimoError = error; await sleep(500 * intentos); }
                                else { ok = true; }
                            } catch (netErr) {
                                ultimoError = netErr;
                                await sleep(1000 * intentos);
                            }
                        }
                        if (!ok) throw new Error('Falló al insertar el lote ' + nroLote + '/' + totalLotes + ' (luego de varios reintentos). ' + (ultimoError?.message || '') + ' — Se importaron ' + insertados + ' contratos antes del corte.');
                        insertados += lote.length;
                        setContratosProgress(Math.round((insertados / records.length) * 100));
                        await sleep(200);
                    }

                    // Registrar fecha de actualización
                    try { localStorage.setItem('contratos_updated_at', new Date().toISOString()); } catch(e) {}

                    reloadContratos();
                    alert(`✅ Contratos actualizados: ${insertados} registros importados (reemplazo total).`);
                } catch (e) {
                    alert('Error al importar contratos: ' + e.message);
                } finally {
                    setContratosProcessing(false);
                }
            };

            const clearAllHistory = async () => {
                if(!window.confirm('¿Seguro que deseas ELIMINAR TODO el historial (Solicitudes, Asignaciones, Cupos y Plantillas)?\n\nEsta operación es DEFINITIVA y afecta a TODOS los analistas.')) return;
                try {
                    await sb.from('assigned_quotas').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    await sb.from('quota_alfanumericos').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    await sb.from('buyer_quotas').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    await sb.from('requests').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    alert('Historial eliminado.');
                    reloadRequests(); reloadBuyerQuotas(); reloadAssigned();
                } catch (e) {
                    alert('Error al eliminar: ' + e.message);
                }
            };

            // --- IMPORTAR ESTADOS DESDE EXCEL DEL STOP ---
            const [stopProcessing, setStopProcessing] = useState(false);

            const mapStopEstado = (raw) => {
                if (!raw) return null;
                const s = raw.toString().toUpperCase();
                if (s.includes('DESCARGADO')) return 'DESCARGADO';
                if (s.includes('ARRIBO') || s.includes('ARRIBADO')) return 'ARRIBADO';
                if (s.includes('ACTIVADO')) return 'ACTIVADO';
                if (s.includes('SIN CTG')) return 'SIN CTG';
                return null;
            };

            const handleStopUpload = async (event) => {
                const file = event.target.files[0];
                event.target.value = '';
                if (!file) return;
                setStopProcessing(true);
                try {
                    const buffer = await file.arrayBuffer();
                    const wb = XLSX.read(buffer, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

                    if (rows.length < 7) {
                        alert('El archivo no tiene el formato esperado del STOP (muy pocas filas).');
                        setStopProcessing(false);
                        return;
                    }

                    const headerRow = rows[5].map(h => (h || '').toString().trim());
                    const idxAlfa = headerRow.findIndex(h => h === 'Id Turno Terminal');
                    const idxEstado = headerRow.findIndex(h => h === 'Estado');
                    const idxCtg = headerRow.findIndex(h => h === 'CTG');

                    if (idxAlfa === -1 || idxEstado === -1) {
                        alert('No se encontraron las columnas "Id Turno Terminal" y/o "Estado" en la fila 6. ¿Es el Excel correcto del STOP?');
                        setStopProcessing(false);
                        return;
                    }

                    const stopMap = {};
                    for (let i = 6; i < rows.length; i++) {
                        const r = rows[i];
                        const alfa = (r[idxAlfa] || '').toString().trim();
                        if (!alfa) continue;
                        const estado = mapStopEstado(r[idxEstado]);
                        const ctg = idxCtg !== -1 ? (r[idxCtg] || '').toString().trim() : '';
                        stopMap[alfa.toUpperCase()] = { estado, ctg };
                    }

                    const totalStop = Object.keys(stopMap).length;
                    let actualizados = 0, sinCambio = 0, sinMatch = 0, protegidos = 0;
                    const updates = [];

                    assignedQuotas.forEach(q => {
                        const alfa = (q.alfanumerico || '').toString().trim().toUpperCase();
                        if (!alfa) { sinMatch++; return; }
                        const found = stopMap[alfa];
                        if (!found || !found.estado) { sinMatch++; return; }
                        if (q.estadoAlfanumerico === 'ANULADO' || q.estadoAlfanumerico === 'DEVUELTO') { protegidos++; return; }
                        if (q.estadoAlfanumerico === found.estado) { sinCambio++; return; }
                        updates.push({ id: q.id, estado: found.estado });
                        actualizados++;
                    });

                    if (updates.length === 0) {
                        alert(`Procesado.\n\n• Alfanuméricos en el STOP: ${totalStop}\n• Cupos asignados en sistema: ${assignedQuotas.length}\n• Sin cambios (ya estaban al día): ${sinCambio}\n• Sin coincidencia en STOP: ${sinMatch}\n• Protegidos (anulados/devueltos): ${protegidos}\n\nNo hubo estados nuevos para actualizar.`);
                        setStopProcessing(false);
                        return;
                    }

                    let errores = 0;
                    for (const u of updates) {
                        const { error } = await sb.from('assigned_quotas').update({ estado_alfanumerico: u.estado }).eq('id', u.id);
                        if (error) errores++;
                    }

                    reloadAssigned();
                    alert(`✅ Importación STOP completada.\n\n• Alfanuméricos en el STOP: ${totalStop}\n• Cupos ACTUALIZADOS: ${actualizados - errores}\n• Sin cambios (ya al día): ${sinCambio}\n• Sin coincidencia en STOP: ${sinMatch}\n• Protegidos (anulados/devueltos): ${protegidos}${errores > 0 ? '\n• Errores al guardar: ' + errores : ''}`);
                } catch (e) {
                    alert('Error al procesar el STOP: ' + e.message);
                } finally {
                    setStopProcessing(false);
                }
            };

            // Guardar/actualizar plantilla (usado por el ABM)
            const saveTemplateGlobal = async (name, data) => {
                try {
                    const existing = cpTemplates.find(t => t.name === name);
                    if (existing) {
                        const { error } = await sb.from('cp_templates').update({ data }).eq('id', existing.id);
                        if (error) throw error;
                    } else {
                        const { error } = await sb.from('cp_templates').insert({ name, data });
                        if (error) throw error;
                    }
                    reloadTemplates();
                } catch (e) { alert('Error guardando plantilla: ' + e.message); }
            };

            // Banner de configuración pendiente
            if (SUPABASE_URL.includes('PEGAR_AQUI') || SUPABASE_PUBLISHABLE_KEY.includes('PEGAR_AQUI')) {
                return (
                    <div className="h-screen flex items-center justify-center bg-rose-50 p-8">
                        <div className="bg-white border-2 border-rose-300 rounded-xl shadow-xl p-8 max-w-2xl">

                            <p className="text-slate-700 mb-4">Falta configurar las credenciales de Supabase. Editá el archivo HTML y reemplazá las constantes <code className="bg-slate-100 px-2 py-0.5 rounded text-xs">SUPABASE_URL</code> y <code className="bg-slate-100 px-2 py-0.5 rounded text-xs">SUPABASE_PUBLISHABLE_KEY</code> al inicio del bloque de script.</p>
                            <p className="text-sm text-slate-500">Buscá el comentario <code>// SUPABASE: configuración y cliente</code> al inicio del script.</p>
                        </div>
                    </div>
                );
            }

            // Gate de autenticación
            if (!authChecked) {
                return <div className="h-screen flex items-center justify-center bg-slate-100"><span className="text-slate-400 animate-pulse">Cargando...</span></div>;
            }
            if (!currentUser) {
                return <LoginScreen onLogin={handleLogin} needsFirstAnalyst={needsFirstAnalyst} onCreateFirst={()=>setNeedsFirstAnalyst(false)} />;
            }

            return (
                <div className="h-screen flex flex-col bg-slate-100 overflow-hidden">
                    {/* BARRA DE NAVEGACIÓN SUPERIOR (Zócalo Verde) */}
                    <nav className="bg-gradient-to-r from-emerald-900 to-emerald-700 text-white p-2.5 shadow-md shrink-0 z-50">
                        <div className="w-full px-4 flex justify-between items-center gap-3">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-800 p-1.5 rounded-lg border border-emerald-600/50 shadow-inner">
                                    <Icons.Layers className="w-4 h-4 text-emerald-100"/>
                                </div>
                                <div>
                                    <h1 className="font-bold text-sm leading-tight text-white shadow-sm">GESTIÓN DE LOGÍSTICA - INTAGRO SA</h1>
                                </div>
                                {isLoading && <span className="text-[10px] bg-emerald-950/50 px-2 py-1 rounded text-emerald-200 animate-pulse">Cargando...</span>}
                            </div>
                            
                            {/* BOTONERA PRINCIPAL */}
                            <div className="flex items-center gap-2">
                                {isAnalista ? (
                                    <div className="flex bg-emerald-950/40 rounded-lg p-1 shrink-0 border border-emerald-800/50">
                                        <button onClick={() => setActiveTab('dashboard')} className={`px-2 py-1 rounded-md text-[11px] font-bold transition-all flex items-center gap-1 whitespace-nowrap ${activeTab === 'dashboard' ? 'bg-white text-emerald-900 shadow' : 'text-emerald-100 hover:text-white hover:bg-emerald-800/60'}`}>
                                            <Icons.LayoutDashboard className="w-3 h-3 shrink-0"/> Dashboard
                                        </button>
                                        <button onClick={() => setActiveTab('form')} className={`px-2 py-1 rounded-md text-[11px] font-bold transition-all flex items-center gap-1 whitespace-nowrap ${activeTab === 'form' ? 'bg-white text-emerald-900 shadow' : 'text-emerald-100 hover:text-white hover:bg-emerald-800/60'}`}>
                                            <Icons.Plus className="w-3 h-3 shrink-0"/> Cargar Solicitud
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 shrink-0">
                                        <button onClick={() => setActiveTab('dashboard')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${activeTab === 'dashboard' ? 'bg-white text-emerald-900 shadow' : 'bg-emerald-950/40 text-emerald-100 hover:text-white hover:bg-emerald-800/60 border border-emerald-800/50'}`}>
                                            <Icons.LayoutDashboard className="w-3 h-3"/> Mis Solicitudes
                                        </button>
                                        <button onClick={() => setActiveTab('form')} className={`px-4 py-2 rounded-lg text-sm font-extrabold transition-all flex items-center gap-2 shadow-md ${activeTab === 'form' ? 'bg-white text-blue-900 ring-2 ring-blue-300' : 'bg-blue-500 hover:bg-blue-400 text-white animate-pulse-slow'}`}>
                                            <Icons.Plus className="w-4 h-4"/> CARGAR SOLICITUD
                                        </button>
                                    </div>
                                )}

                                {isAnalista && (
                                    <button onClick={() => setShowABM(true)} className="flex items-center gap-1 bg-emerald-800/60 hover:bg-emerald-800 text-[11px] font-bold px-2 py-1 rounded-lg transition text-emerald-50 border border-emerald-600/50 whitespace-nowrap shrink-0" title="Administrar Destinos, Plantillas, Intervinientes, Clientes y Usuarios">
                                        <Icons.Database className="w-3 h-3 shrink-0"/><span>ABM</span>
                                    </button>
                                )}

                                {isAnalista && (
                                    <label className={`flex items-center gap-1 text-[11px] font-bold px-2 py-1 rounded-lg cursor-pointer transition shadow-sm border whitespace-nowrap shrink-0 ${stopProcessing ? 'bg-slate-400 text-slate-200 cursor-wait border-slate-500' : 'bg-indigo-600 hover:bg-indigo-500 text-white border-indigo-500/50'}`} title="Importar estados de alfanuméricos desde el Excel del STOP">
                                        <Icons.Upload className="w-3 h-3 shrink-0"/><span>{stopProcessing ? 'Procesando...' : 'Cargar STOP'}</span><input type="file" accept=".xlsx,.xls" onChange={handleStopUpload} disabled={stopProcessing} className="hidden" />

                                {isAnalista && (
                                    <label className={`flex items-center gap-1 text-[11px] font-bold px-2 py-1 rounded-lg cursor-pointer transition shadow-sm border whitespace-nowrap shrink-0 ${contratosProcessing ? 'bg-slate-400 text-slate-200 cursor-wait border-slate-500' : 'bg-emerald-600 hover:bg-emerald-500 text-white border-emerald-500/50'}`} title="Importar contratos pendientes de entrega (reemplazo total)">
                                        <Icons.Upload className="w-3 h-3 shrink-0"/><span>{contratosProcessing ? `Procesando ${contratosProgress}%` : 'Cargar Contratos'}</span><input type="file" accept=".xlsx,.xls" onChange={handleContratosUpload} disabled={contratosProcessing} className="hidden" />
                                    </label>
                                )}

                                <div className="flex items-center gap-2 ml-1 pl-2 border-l border-emerald-600/40">
                                    <div className="text-right leading-tight">
                                        <div className="text-xs font-bold text-white">{currentUser.username}</div>
                                        <div className="text-[9px] text-emerald-200 uppercase">{currentUser.rol}</div>
