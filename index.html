                                    <button onClick={handleLogout} className="flex items-center gap-1 bg-emerald-950/50 hover:bg-rose-700 text-xs font-bold px-2.5 py-1.5 rounded-lg transition text-emerald-100 border border-emerald-700/50" title="Cerrar sesión">
                                        <Icons.Lock className="w-3.5 h-3.5"/><span>Salir</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>
                    
                    {/* CONTENIDO PRINCIPAL */}
                    <main className="flex-1 overflow-hidden relative">
                        {activeTab === 'dashboard' ? (
                            <AdminDashboard 
                                requests={visibleRequests} reloadRequests={reloadRequests}
                                buyerQuotas={buyerQuotas} reloadBuyerQuotas={reloadBuyerQuotas}
                                assignedQuotas={visibleAssigned} reloadAssigned={reloadAssigned}
                                cpTemplates={cpTemplates} reloadTemplates={reloadTemplates}
                                destinos={destinos} intervinientes={intervinientes}
                                isAnalista={isAnalista}
                            />
                        ) : (
                            <div className="h-full overflow-y-auto custom-scroll p-4"><SalesDashboard reloadRequests={reloadRequests} clientes={clientes} currentUser={currentUser} isAnalista={isAnalista} destinos={destinos} intervinientes={intervinientes} contratos={contratos} /></div>
                        )}
                    </main>

                    {showABM && (
                        <ABMModal
                            onClose={()=>setShowABM(false)}
                            destinos={destinos} reloadDestinos={reloadDestinos}
                            intervinientes={intervinientes} reloadIntervinientes={reloadIntervinientes}
                            clientes={clientes} reloadClientes={reloadClientes}
                            cpTemplates={cpTemplates} reloadTemplates={reloadTemplates}
                            saveTemplate={saveTemplateGlobal}
                            productos={MOCK_OPTIONS.productos}
                            currentUser={currentUser}
                        />
                    )}
                </div>
            );
        }

        // --- DASHBOARD ADMIN (LAS 3 GRILLAS + FILTRO MAESTRO) ---
        function AdminDashboard({ requests, reloadRequests, buyerQuotas, reloadBuyerQuotas, assignedQuotas, reloadAssigned, cpTemplates, reloadTemplates, destinos, intervinientes, isAnalista }) {
            
            // UTILIDAD PARA LIMPIAR CUIT DE GRILLAS
            const stripCuit = (str) => {
                if (!str) return '';
                const parts = str.split(' - ');
                return parts.length > 1 ? parts.slice(1).join(' - ') : str;
            };

            // --- ORDENAMIENTO POR COLUMNA (las 3 grillas) ---
            // Cada grilla guarda { key, dir }. dir: 'asc' | 'desc' | null
            const [sort1, setSort1] = useState({ key: null, dir: null });
            const [sort2, setSort2] = useState({ key: null, dir: null });
            const [sort3, setSort3] = useState({ key: null, dir: null });

            // Alterna asc -> desc -> sin orden
            const toggleSort = (setSort, key) => {
                setSort(prev => {
                    if (prev.key !== key) return { key, dir: 'asc' };
                    if (prev.dir === 'asc') return { key, dir: 'desc' };
                    if (prev.dir === 'desc') return { key: null, dir: null };
                    return { key, dir: 'asc' };
                });
            };

            // Ordena un array según {key, dir}. Detecta números, fechas y texto.
            const applySort = (arr, sort) => {
                if (!sort.key || !sort.dir) return arr;
                const sorted = [...arr].sort((a, b) => {
                    let va = a[sort.key], vb = b[sort.key];
                    if (va === null || va === undefined) va = '';
                    if (vb === null || vb === undefined) vb = '';
                    // Numérico
                    const na = parseFloat(va), nb = parseFloat(vb);
                    const bothNum = !isNaN(na) && !isNaN(nb) && String(va).trim() !== '' && String(vb).trim() !== '' && /^[\d.,\s-]+$/.test(String(va)) && /^[\d.,\s-]+$/.test(String(vb));
                    let cmp;
                    if (bothNum) {
                        cmp = na - nb;
                    } else {
                        cmp = String(va).toLowerCase().localeCompare(String(vb).toLowerCase(), 'es', { numeric: true });
                    }
                    return sort.dir === 'asc' ? cmp : -cmp;
                });
                return sorted;
            };

            // Encabezado clickeable con flecha de orden
            const SortableTh = ({ label, sortKey, sort, setSort, className }) => {
                const active = sort.key === sortKey;
                const arrow = !active ? '↕' : (sort.dir === 'asc' ? '▲' : '▼');
                return (
                    <th className={`header-compact cursor-pointer select-none hover:bg-black/5 transition ${className || ''}`} onClick={() => toggleSort(setSort, sortKey)} title="Clic para ordenar">
                        <span className="inline-flex items-center gap-1">{label}<span className={`text-[9px] ${active ? 'opacity-100' : 'opacity-30'}`}>{arrow}</span></span>
                    </th>
                );
            };

            // ESTADOS DE FILTRO MAESTRO
            const [date, setDate] = useState(() => {
                const dt = new Date();
                dt.setDate(dt.getDate() + 1);
                return dt.toISOString().slice(0, 10);
            }); 
            const [product, setProduct] = useState('Todos');
            const [representative, setRepresentative] = useState('Todos');
            const [destination, setDestination] = useState('Todos');
            const [alfaFilter, setAlfaFilter] = useState('ALL');

            // NUEVOS ESTADOS GRILLA 3
            const [searchG3, setSearchG3] = useState('');
            const [showAnnulModal, setShowAnnulModal] = useState(false);
            const [annulObs, setAnnulObs] = useState('');
            const [showReturnModal, setShowReturnModal] = useState(false);
            const [returnObs, setReturnObs] = useState('');

            // ESTADOS UI
            const [expandedGrid, setExpandedGrid] = useState(null);
            const [showAddCuposModal, setShowAddCuposModal] = useState(false);
            const [editingBatch, setEditingBatch] = useState(null); 
            const [managingBatchId, setManagingBatchId] = useState(null); 
            const [selectedAssigned, setSelectedAssigned] = useState([]); 
            const [assigningReq, setAssigningReq] = useState(null);
            const [viewingCpData, setViewingCpData] = useState(null); 

            // Generar Opciones Únicas para los Filtros
            const allProducts = useMemo(() => [...new Set([...requests.map(r => r.product), ...assignedQuotas.map(q => q.product)].map(x => (x || '').toString().trim().toUpperCase()))].filter(Boolean).sort(), [requests, assignedQuotas]);
            const allRepres = useMemo(() => [...new Set([...requests.map(r => r.contractRepre), ...assignedQuotas.map(q => q.contractRepre)].map(x => (x || '').toString().trim().toUpperCase()))].filter(Boolean).sort(), [requests, assignedQuotas]);
            const allDestinations = useMemo(() => [...new Set([...requests.map(r => r.contractDestino), ...assignedQuotas.map(q => q.contractDestino)].map(x => (x || '').toString().trim().toUpperCase()))].filter(Boolean).sort(), [requests, assignedQuotas]);

            const changeDate = (d) => { 
                const base = date || new Date().toISOString().slice(0,10);
                const dt = new Date(base+'T12:00:00'); 
                dt.setDate(dt.getDate()+d); 
                setDate(dt.toISOString().slice(0,10)); 
            };

            const filterFn = (r) => {
                const rDate = r.date || r.contractDesde; 
                const up = (x) => (x || '').toString().trim().toUpperCase();
                return (date === '' || rDate === date) && 
                       (product === 'Todos' || up(r.product) === up(product)) && 
                       (representative === 'Todos' || up(r.contractRepre) === up(representative)) &&
                       (destination === 'Todos' || up(r.contractDestino) === up(destination));
            };

            const filteredRequests = useMemo(() => requests.filter(filterFn), [requests, date, product, representative, destination]);
            const sortedRequests = useMemo(() => applySort(filteredRequests, sort2), [filteredRequests, sort2]);
            const filteredAssigned = useMemo(() => assignedQuotas.filter(filterFn), [assignedQuotas, date, product, representative, destination]);

            // Filtro de la Grilla 1 (lotes). Los lotes no tienen "representante",
            // así que filtran por fecha, producto y destino.
            const filteredBuyerQuotas = useMemo(() => buyerQuotas.filter(q => {
                const up = (x) => (x || '').toString().trim().toUpperCase();
                return (date === '' || q.fechaCupo === date) &&
                       (product === 'Todos' || up(q.producto) === up(product)) &&
                       (destination === 'Todos' || up(q.destino) === up(destination));
            }), [buyerQuotas, date, product, destination]);
            const sortedBuyerQuotas = useMemo(() => applySort(filteredBuyerQuotas, sort1), [filteredBuyerQuotas, sort1]);

            // --- CÁLCULO DE TOTALIZADORES ---
            const t1 = useMemo(() => {
                let otorgados = 0, asignados = 0, anulados = 0, devueltos = 0;
                filteredBuyerQuotas.forEach(q => { 
                    otorgados += Number(q.otorgados || 0); 
                    asignados += Number(q.asignados || 0); 
                    anulados += Number(q.anulados || 0);
                    devueltos += Number(q.devueltos || 0);
                });
                return { otorgados, asignados, anulados, devueltos, disponibles: otorgados - asignados - anulados - devueltos };
            }, [filteredBuyerQuotas]);

            const t2 = useMemo(() => {
                let solicitados = 0, pendientes = 0, rechazados = 0, asignados = 0;
                filteredRequests.forEach(r => {
                    const orig = Number(r.originalQuantity || 0);
                    const pend = Number(r.quantity || 0);
                    const rech = Number(r.rejectedQty || 0);
                    solicitados += orig;
                    pendientes += pend;
                    rechazados += rech;
                    asignados += Math.max(0, orig - pend - rech);
                });
                return { solicitados, asignados, pendientes, rechazados };
            }, [filteredRequests]);

            const t3 = useMemo(() => {
                return filteredAssigned.reduce((acc, q) => acc + Number(q.quantity || 0), 0);
            }, [filteredAssigned]);

            const t_alfa = useMemo(() => {
                let sinDatos = 0, sinCtg = 0, activados = 0, arribados = 0, descargados = 0, anulados = 0, devueltos = 0;
                filteredAssigned.forEach(q => {
                    const qty = Number(q.quantity || 0);
                    const st = q.estadoAlfanumerico || 'SIN DATOS';
                    if (st === 'SIN DATOS') sinDatos += qty;
                    else if (st === 'SIN CTG') sinCtg += qty;
                    else if (st === 'ACTIVADO') activados += qty;
                    else if (st === 'ARRIBADO') arribados += qty;
                    else if (st === 'DESCARGADO') descargados += qty;
                    else if (st === 'ANULADO') anulados += qty;
                    else if (st === 'DEVUELTO') devueltos += qty;
                });
                return { sinDatos, sinCtg, activados, arribados, descargados, anulados, devueltos };
            }, [filteredAssigned]);

            const finalAssigned = useMemo(() => {
                let filtered = filteredAssigned;
                if (alfaFilter !== 'ALL') {
                    filtered = filtered.filter(q => (q.estadoAlfanumerico || 'SIN DATOS') === alfaFilter);
                }
                if (searchG3) {
                    const term = searchG3.toLowerCase();
                    filtered = filtered.filter(q => 
                        (q.clientName || '').toLowerCase().includes(term) ||
                        (q.contractRepre || '').toLowerCase().includes(term) ||
                        (q.contract || '').toLowerCase().includes(term) ||
                        (q.product || '').toLowerCase().includes(term) ||
                        (q.contractComprador || '').toLowerCase().includes(term) ||
                        (q.batchComprador || '').toLowerCase().includes(term) ||
                        (q.alfanumerico || '').toLowerCase().includes(term) ||
                        (q.estadoAlfanumerico || '').toLowerCase().includes(term) ||
                        (q.observacionAnulacion || '').toLowerCase().includes(term) ||
                        (q.observacionDevolucion || '').toLowerCase().includes(term) ||
                        (q.cpData?.rteVentaPrimaria || '').toLowerCase().includes(term) ||
                        (q.cpData?.rteVentaSecundaria || '').toLowerCase().includes(term) ||
                        (q.cpData?.corredorPrimaria || '').toLowerCase().includes(term) ||
                        (q.cpData?.corredorSecundaria || '').toLowerCase().includes(term)
                    );
                }
                
                // Si el usuario eligió ordenar por una columna, ese orden manda.
                if (sort3.key && sort3.dir) {
                    return applySort(filtered, sort3);
                }

                // Orden por defecto: DEVUELTO arriba (1), ANULADO abajo (3), resto en el medio (2)
                filtered = [...filtered].sort((a, b) => {
                    const getWeight = (status) => {
                        if (status === 'DEVUELTO') return 1;
                        if (status === 'ANULADO') return 3;
                        return 2;
                    };
                    return getWeight(a.estadoAlfanumerico || 'SIN DATOS') - getWeight(b.estadoAlfanumerico || 'SIN DATOS');
                });

                return filtered;
            }, [filteredAssigned, alfaFilter, searchG3, sort3]);

            const cumplimiento = t3 > 0 ? ((t_alfa.descargados / t3) * 100).toFixed(1).replace('.', ',') : '0,0';

            // --- LÓGICA DE GRILLA 1: GUARDAR/EDITAR LOTE ---
            const handleSaveNewBatch = async (batchData, isEditing = false, editId = null) => {
                try {
                    const payload = {
                        fecha_cupo: batchData.fechaCupo || null,
                        producto: batchData.producto,
                        comprador: stripCuit(batchData.comprador),
                        rte_comercial_primaria: stripCuit(batchData.rteVentaPrimaria),
                        rte_comercial_secundaria: stripCuit(batchData.rteVentaSecundaria) || stripCuit(batchData.rteVentaSecundaria2),
                        corredor_primaria: stripCuit(batchData.corredorPrimaria),
                        corredor_secundaria: stripCuit(batchData.corredorSecundaria),
                        obs_calidad: batchData.observacionesCalidad,
                        destinatario: stripCuit(batchData.destinatario),
                        destino: stripCuit(batchData.destino),
                        condicion: 'C/Descarga',
                        comp_vend_a3: stripCuit(batchData.mercadoTermino),
                        observaciones: batchData.observaciones,
                        full_cp_data: batchData
                    };

                    let quotaId;
                    if (isEditing) {
                        const { error: e1 } = await sb.from('buyer_quotas').update(payload).eq('id', editId);
                        if (e1) throw e1;
                        quotaId = editId;
                    } else {
                        const { data, error: e1 } = await sb.from('buyer_quotas').insert(payload).select().single();
                        if (e1) throw e1;
                        quotaId = data.id;
                    }

                    // Insertar alfanuméricos nuevos (los que no existían).
                    // Si edición: dejamos los existentes intactos y solo agregamos los nuevos.
                    if (batchData.alfanumericosList && batchData.alfanumericosList.length > 0) {
                        // Ver qué códigos ya existen para este lote
                        const { data: existing } = await sb.from('quota_alfanumericos').select('code').eq('buyer_quota_id', quotaId);
                        const existingCodes = new Set((existing || []).map(a => a.code));
                        const toInsert = batchData.alfanumericosList
                            .filter(c => !existingCodes.has(c))
                            .map(c => ({ buyer_quota_id: quotaId, code: c, status: 'disponible' }));
                        if (toInsert.length > 0) {
                            const { error: e2 } = await sb.from('quota_alfanumericos').insert(toInsert);
                            if (e2) throw e2;
                        }
                    }

                    setShowAddCuposModal(false);
                    setEditingBatch(null);
                    reloadBuyerQuotas();
                } catch (e) {
                    alert('Error al guardar lote: ' + e.message);
                }
            };

            const updateBuyerQuota = async (id, field, value) => {
                // Mapeo de camelCase -> snake_case
                const fieldMap = {
                    fechaCupo: 'fecha_cupo',
                    producto: 'producto', comprador: 'comprador',
                    rteComercialPrimaria: 'rte_comercial_primaria', rteComercialSecundaria: 'rte_comercial_secundaria',
                    corredorPrimaria: 'corredor_primaria', corredorSecundaria: 'corredor_secundaria',
                    obsCalidad: 'obs_calidad', destinatario: 'destinatario', destino: 'destino',
                    condicion: 'condicion', compVendA3: 'comp_vend_a3', observaciones: 'observaciones'
                };
                const dbField = fieldMap[field];
                if (!dbField) return;
                // Los contadores otorgados/asignados/anulados/devueltos se calculan desde alfas, no se editan acá
                if (['otorgados','asignados','anulados','devueltos'].includes(field)) return;
                try {
                    const { error } = await sb.from('buyer_quotas').update({ [dbField]: value }).eq('id', id);
                    if (error) throw error;
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };

            const deleteBuyerQuota = async (id) => { 
                if(!window.confirm('¿Eliminar este lote completo? Esto borra también todos sus alfanuméricos.')) return;
                try {
                    const { error } = await sb.from('buyer_quotas').delete().eq('id', id);
                    if (error) throw error;
                    reloadBuyerQuotas();
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };

            const handleSaveAlfas = async (batchId, newAlfas) => {
                try {
                    // Cargamos los alfas actuales para hacer diff
                    const { data: current, error: e0 } = await sb.from('quota_alfanumericos').select('*').eq('buyer_quota_id', batchId);
                    if (e0) throw e0;
                    const currentByCode = {};
                    (current || []).forEach(a => { currentByCode[a.code] = a; });

                    // Nuevos alfas: insertar; existentes con cambio de status: update
                    const toInsert = [];
                    const toUpdate = [];
                    newAlfas.forEach(a => {
                        const ex = currentByCode[a.code];
                        if (!ex) {
                            toInsert.push({ buyer_quota_id: batchId, code: a.code, status: a.status || 'disponible' });
                        } else if (ex.status !== a.status) {
                            toUpdate.push({ id: ex.id, status: a.status });
                        }
                    });

                    if (toInsert.length > 0) {
                        const { error: e1 } = await sb.from('quota_alfanumericos').insert(toInsert);
                        if (e1) throw e1;
                    }
                    for (const u of toUpdate) {
                        const { error: e2 } = await sb.from('quota_alfanumericos').update({ status: u.status }).eq('id', u.id);
                        if (e2) throw e2;
                    }
                    setManagingBatchId(null);
                    reloadBuyerQuotas();
                } catch (e) {
                    alert('Error al actualizar alfanuméricos: ' + e.message);
                }
            };

            // --- LÓGICA DE ASIGNACIÓN INTERACTIVA MULTI-LOTE ---
            const handleConfirmAssignment = async (reqId, allocationsArray) => {
                const req = requests.find(r => r.id === reqId);
                if (!req || allocationsArray.length === 0) return;

                try {
                    let totalAssigned = 0;
                    const newAssignedItems = [];
                    const alfaUpdates = [];

                    for (const { batchId, qty } of allocationsArray) {
                        if (qty <= 0) continue;
                        const batch = buyerQuotas.find(b => b.id === batchId);
                        if (!batch) continue;

                        // Refresh alfas disponibles desde DB para evitar concurrencia
                        const { data: dispAlfas, error: eAlfa } = await sb
                            .from('quota_alfanumericos')
                            .select('*')
                            .eq('buyer_quota_id', batchId)
                            .eq('status', 'disponible')
                            .limit(qty);
                        if (eAlfa) throw eAlfa;
                        if ((dispAlfas || []).length < qty) {
                            throw new Error(`El lote ya no tiene ${qty} cupos disponibles (otro analista asignó). Refrescá e intentá de nuevo.`);
                        }

                        for (let i = 0; i < qty; i++) {
                            const alfa = dispAlfas[i];
                            alfaUpdates.push(alfa.id);
                            newAssignedItems.push({
                                original_req_id: req.id,
                                batch_id: batchId,
                                client_name: req.clientName || '',
                                product: req.product || '',
                                contract: req.contract || '',
                                contract_destino: req.contractDestino || '',
                                contract_repre: req.contractRepre || '',
                                contract_comprador: req.contractComprador || '',
                                contract_desde: req.contractDesde || '',
                                contract_hasta: req.contractHasta || '',
                                contract_origen: req.contractOrigen || '',
                                contract_tipo: req.contractTipo || '',
                                observations: req.observations || '',
                                date: req.date || '',
                                batch_comprador: batch.comprador || '',
                                cp_data: batch.fullCpData || null,
                                destinatario: batch.destinatario || batch.fullCpData?.destinatario || '',
                                destino: batch.destino || batch.fullCpData?.destino || '',
                                alfanumerico: alfa.code,
                                estado_alfanumerico: 'SIN CTG'
                            });
                        }
                        totalAssigned += qty;
                    }

                    if (totalAssigned === 0) return;

                    // Marcar alfanuméricos como 'asignado'
                    for (const alfaId of alfaUpdates) {
                        const { error } = await sb.from('quota_alfanumericos').update({ status: 'asignado' }).eq('id', alfaId).eq('status', 'disponible');
                        if (error) throw error;
                    }

                    // Crear assigned_quotas
                    const { error: eIns } = await sb.from('assigned_quotas').insert(newAssignedItems);
                    if (eIns) throw eIns;

                    // Restar cantidad pendiente de la solicitud
                    const newQty = (req.quantity || 0) - totalAssigned;
                    const { error: eUpd } = await sb.from('requests').update({ quantity_remaining: Math.max(0, newQty) }).eq('id', reqId);
                    if (eUpd) throw eUpd;

                    setAssigningReq(null);
                    reloadRequests();
                    reloadBuyerQuotas();
                    reloadAssigned();
                } catch (e) {
                    alert('Error en asignación: ' + e.message);
                    reloadRequests();
                    reloadBuyerQuotas();
                    reloadAssigned();
                }
            };

            const handleRejectRequest = async (reqId, qtyToReject) => {
                if(qtyToReject <= 0) return;
                const req = requests.find(r => r.id === reqId);
                if (!req) return;
                const actualReject = Math.min(req.quantity, qtyToReject);
                try {
                    const { error } = await sb.from('requests').update({
                        quantity_remaining: req.quantity - actualReject,
                        rejected_qty: (req.rejectedQty || 0) + actualReject
                    }).eq('id', reqId);
                    if (error) throw error;
                    reloadRequests();
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };

            const handleRecoverRequest = async (reqId) => {
                const req = requests.find(r => r.id === reqId);
                if (!req || !req.rejectedQty) return;
                try {
                    const { error } = await sb.from('requests').update({
                        quantity_remaining: req.quantity + req.rejectedQty,
                        rejected_qty: 0
                    }).eq('id', reqId);
                    if (error) throw error;
                    reloadRequests();
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };

            // --- LÓGICA DE GRILLA 3 ---

                    alfanumerico: 'alfanumerico', estadoAlfanumerico: 'estado_alfanumerico',
                    destinatario: 'destinatario', destino: 'destino'
                };
                const dbField = fieldMap[field];
                if (!dbField) return;
                try {
                    const updates = { [dbField]: value };
                    if (field === 'alfanumerico') {
                        const cur = assignedQuotas.find(q => q.id === id);
                        if (value && value.trim() && cur?.estadoAlfanumerico === 'SIN DATOS') updates.estado_alfanumerico = 'SIN CTG';
                        if (!value.trim() && cur?.estadoAlfanumerico === 'SIN CTG') updates.estado_alfanumerico = 'SIN DATOS';
                    }
                    const { error } = await sb.from('assigned_quotas').update(updates).eq('id', id);
                    if (error) throw error;
                } catch (e) {
                    alert('Error: ' + e.message);
                }
            };
            
            const handleSingleReturnClick = (id) => {

            const handleSelectAssigned = (id) => {

            const handleBulkReturnClick = () => {

                    reloadAssigned();

                    alert('Error: ' + e.message);

            const handleConfirmReturn = async () => {
                try {

                            await sb.from('quota_alfanumericos')

                    reloadAssigned();

                    alert('Error: ' + e.message);
                }

                    {managingBatchId && <ManageAlfaModal batch={buyerQuotas.find(q => q.id === managingBatchId)} onClose={() => setManagingBatchId(null)} onSave={handleSaveAlfas} />}
                    {viewingCpData && <ViewCpModal cpData={viewingCpData} onClose={() => setViewingCpData(null)} />}

                    {/* NUEVO Modal Asignación Multi-Lote */}
                    {assigningReq && <AssignQuotaModal request={assigningReq} buyerQuotas={buyerQuotas} onClose={() => setAssigningReq(null)} onConfirm={handleConfirmAssignment} onViewCp={setViewingCpData} />}

                    {/* Modal Anulación */}

                                    <button onClick={() => setShowAnnulModal(false)} className="hover:text-red-200"><Icons.X className="w-5 h-5"/></button>
                                </div>
                                <div className="p-4 bg-slate-50">
                                    <p className="text-sm text-slate-600 mb-3 font-medium">Motivo de la anulación:</p>
                                    <textarea 
                                        value={annulObs}
                                        onChange={e => setAnnulObs(e.target.value)}
                                        className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm resize-none h-24"
                                        placeholder="Ej: Problemas en puerto, rechazo comercial, etc..."
                                    ></textarea>
                                </div>
                                <div className="p-3 bg-white border-t border-slate-200 flex justify-end gap-2 rounded-b-xl">
                                    <button onClick={() => setShowAnnulModal(false)} className="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition">Cancelar</button>
                                    <button onClick={handleConfirmAnnul} disabled={!annulObs.trim()} className="px-4 py-2 text-sm font-bold text-white bg-red-600 hover:bg-red-700 rounded-lg disabled:opacity-50 shadow-sm transition active:scale-95">Confirmar Anulación</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Devolución */}
                    {showReturnModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col animate-slide-in border border-blue-200">
                                <div className="bg-blue-600 p-3 flex justify-between items-center text-white shrink-0 rounded-t-xl">
                                    <h3 className="font-bold flex items-center gap-2"><Icons.Undo className="w-4 h-4"/> Devolver {selectedAssigned.length} Cupo(s)</h3>
                                    <button onClick={() => setShowReturnModal(false)} className="hover:text-blue-200"><Icons.X className="w-5 h-5"/></button>
                                </div>
                                <div className="p-4 bg-slate-50">
                                    <p className="text-sm text-slate-600 mb-3 font-medium">Motivo / Observación de la devolución:</p>
                                    <textarea 
                                        value={returnObs}
                                        onChange={e => setReturnObs(e.target.value)}
                                        className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none h-24"
                                        placeholder="Ej: Cambio de destino, error de carga..."
                                    ></textarea>
                                </div>
                                <div className="p-3 bg-white border-t border-slate-200 flex justify-end gap-2 rounded-b-xl">
                                    <button onClick={() => setShowReturnModal(false)} className="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition">Cancelar</button>
                                    <button onClick={handleConfirmReturn} disabled={!returnObs.trim()} className="px-4 py-2 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg disabled:opacity-50 shadow-sm transition active:scale-95">Confirmar Devolución</button>
                                </div>
                            </div>
                        </div>

                    {/* FILTRO MAESTRO SUPERIOR */}
                    <div className="bg-gradient-to-r from-emerald-800 to-emerald-600 px-4 py-2 shadow-md shrink-0 flex flex-wrap items-center gap-3 z-20 border-t border-emerald-600/30">
                        <div className="flex items-center gap-2 mr-2">
                            <Icons.Filter className="w-4 h-4 text-emerald-200" />
                            <span className="text-xs font-bold text-emerald-100 uppercase tracking-wider hidden sm:block">Filtros:</span>
                        </div>
                        
                        <div className="flex items-center bg-black/10 rounded-md p-0.5 border border-white/10 backdrop-blur-sm">
                            <button onClick={() => changeDate(-1)} className="p-1 hover:bg-white/20 rounded text-emerald-50 transition"><Icons.ChevronLeft className="w-4 h-4"/></button>
                            <input 
                                type="date" 
                                className="bg-transparent border-none font-bold text-white text-xs text-center w-28 outline-none cursor-pointer [color-scheme:dark]"

                        <select className="p-1.5 border-0 rounded text-xs w-36 bg-black/10 text-white font-medium outline-none backdrop-blur-sm border border-white/10 [&>option]:text-slate-800 transition focus:bg-black/20" value={representative} onChange={e => setRepresentative(e.target.value)}>

                        {/* GRILLA 1: DISPONIBILIDAD CUPOS (solo analista) */}

                            <div className={`overflow-x-auto overflow-y-auto custom-scroll flex-1 min-h-0 ${expandedGrid !== null && expandedGrid !== 1 ? 'hidden' : 'block'}`}>
                                <table className="w-full text-left border-collapse table-blue">
                                    <thead>

                                                rowColorClass += ' !bg-emerald-100/50';
                                            }

                                            return (
                                            <tr key={q.id} className={`transition-colors ${rowColorClass}`}>
                                                <td className="cell-compact text-center border-r border-slate-100 bg-slate-50/50">
                                                    <input type="checkbox" checked={selectedAssigned.includes(q.id)} onChange={() => handleSelectAssigned(q.id)} className="cursor-pointer rounded accent-emerald-600 w-3.5 h-3.5" />
                                                </td>
                                                
                                                <td className="cell-compact text-center border-r border-slate-100 bg-slate-50/50">
                                                    {q.cpData ? (
                                                        <button onClick={() => setViewingCpData({...q.cpData, alfanumericoAsignado: q.alfanumerico})} className="text-xl hover:scale-125 transition-transform" title="Ver Modelo Carta de Porte">
                                                            📄
                                                        </button>
                                                    ) : (
                                                        <span className="text-slate-300">-</span>

                                                </td>

                                                <td className="cell-compact text-center border-r border-slate-100 bg-amber-50/30">
                                                    <button onClick={() => toggleEnviadoComercial(q.id, q.enviadoComercial)} className={`p-1 rounded transition-all hover:scale-110 active:scale-95 ${q.enviadoComercial ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-slate-100 text-slate-400 hover:bg-amber-100 hover:text-amber-700'}`} title={q.enviadoComercial ? `Enviado al comercial${q.enviadoComercialAt ? ' el ' + new Date(q.enviadoComercialAt).toLocaleString() : ''}. Clic para desmarcar.` : 'Marcar como enviado al comercial'}>
                                                        {q.enviadoComercial ? <Icons.MailOpen className="w-3.5 h-3.5"/> : <Icons.Mail className="w-3.5 h-3.5"/>}
                                                    </button>
                                                </td>

                                                <td className="cell-compact bg-blue-50/30">
                                                    <input type="text" value={q.alfanumerico || ''} onChange={e=>updateAssignedQuota(q.id, 'alfanumerico', e.target.value)} placeholder="Código CTG..." className="w-24 input-compact bg-white border border-blue-200 rounded font-bold text-blue-900 focus:ring-2 focus:ring-blue-500 outline-none uppercase shadow-sm transition" />
                                                </td>
                                                <td className="cell-compact bg-blue-50/30" style={{minWidth: '120px'}}>
                                                    <span className={`inline-block w-full text-center input-compact border rounded font-bold shadow-sm whitespace-nowrap ${getAlfaColorClass(q.estadoAlfanumerico)}`} title="Estado del CTG (se actualiza con la carga del STOP)">{q.estadoAlfanumerico || 'SIN DATOS'}</span>
                                                </td>

                                                <td className="cell-compact max-w-[100px] font-bold text-slate-800 truncate border-l border-emerald-100" title={q.clientName}>{q.clientName}</td>
                                                <td className="cell-compact max-w-[80px] text-[10px] text-slate-500 truncate" title={q.contractRepre}>{q.contractRepre}</td>
                                                <td className="cell-compact font-bold text-slate-700">{q.contract}</td>
                                                <td className="cell-compact text-emerald-700 font-medium">{q.product}</td>
                                                <td className="cell-compact text-[10px] truncate max-w-[100px]" title={q.contractComprador}>{q.contractComprador}</td>
                                                
                                                <td className="cell-compact text-[10px] truncate max-w-[120px] text-slate-700" title={q.destinatario}>{q.destinatario || '-'}</td>
                                                <td className="cell-compact text-[10px] truncate max-w-[100px] text-slate-700" title={q.destino}>{q.destino || '-'}</td>

                                                <td className="cell-compact text-[10px] truncate max-w-[100px]" title={q.cpData?.rteVentaPrimaria}>{stripCuit(q.cpData?.rteVentaPrimaria) || '-'}</td>
                                                <td className="cell-compact text-[10px] truncate max-w-[100px]" title={q.cpData?.rteVentaSecundaria}>{stripCuit(q.cpData?.rteVentaSecundaria) || stripCuit(q.cpData?.rteVentaSecundaria2) || '-'}</td>
                                                <td className="cell-compact text-[10px] truncate max-w-[100px]" title={q.cpData?.corredorPrimaria}>{stripCuit(q.cpData?.corredorPrimaria) || '-'}</td>
                                                <td className="cell-compact text-[10px] truncate max-w-[100px]" title={q.cpData?.corredorSecundaria}>{stripCuit(q.cpData?.corredorSecundaria) || stripCuit(q.cpData?.corredorSecundaria2) || '-'}</td>

                                                <td className="cell-compact text-[10px] font-bold italic truncate max-w-[120px]" title={q.observacionAnulacion || q.observacionDevolucion}>
                                                    {q.estadoAlfanumerico === 'ANULADO' ? (
                                                        <span className="text-red-700">{q.observacionAnulacion}</span>
                                                    ) : q.estadoAlfanumerico === 'DEVUELTO' ? (
                                                        <span className="text-blue-700">{q.observacionDevolucion}</span>
                                                    ) : ''}
                                                </td>

                                                <td className="cell-compact text-center bg-slate-50/50 border-l border-slate-200">
                                                    <div className="flex items-center justify-center gap-1">
                                                        {q.estadoAlfanumerico === 'ANULADO' ? (
                                                            <span className="text-[9px] font-bold text-red-700 bg-red-100 px-1.5 py-0.5 rounded border border-red-200">ANULADO</span>
                                                        ) : q.estadoAlfanumerico === 'DEVUELTO' ? (
                                                            <span className="text-[9px] font-bold text-blue-700 bg-blue-100 px-1.5 py-0.5 rounded border border-blue-200">DEVUELTO</span>
                                                        ) : (
                                                            <>
                                                                {isAnalista && <button onClick={()=>{ setSelectedAssigned([q.id]); setShowAnnulModal(true); }} className="text-[9px] font-bold text-red-600 hover:text-white hover:bg-red-600 border border-red-300 px-1.5 py-0.5 rounded transition" title="Anular cupo">Anular</button>}
                                                                <button onClick={()=>handleSingleReturnClick(q.id)} className="text-[9px] font-bold text-blue-600 hover:text-white hover:bg-blue-600 border border-blue-300 px-1.5 py-0.5 rounded transition" title="Devolver cupo">Devolver</button>
                                                            </>
                                                        )}
                                                    </div>
                                                </td>
                                            </tr>
                                        )})}
                                        {finalAssigned.length === 0 && <tr><td colSpan="18" className="p-6 text-center text-slate-400 font-medium">No hay cupos asignados que coincidan con el filtro.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Fila individual para solicitudes pendientes (Grilla 2)
        function PendingRequestRow({ r, onAssign, onReject, onRecover, isAnalista = true }) {
            const [rejectVal, setRejectVal] = useState(r.quantity);
            useEffect(() => { setRejectVal(r.quantity); }, [r.quantity]);

            const isFullyRejected = r.quantity === 0 && r.rejectedQty > 0;
            const asignado = Math.max(0, (r.originalQuantity || 0) - (r.quantity || 0) - (r.rejectedQty || 0));

            return (
                <tr className={`group border-b border-slate-100 last:border-0 transition-colors ${isFullyRejected ? 'bg-red-50 opacity-90 hover:!bg-red-100' : 'bg-white even:bg-slate-100 hover:!bg-amber-100/60'}`}>
                    <td className="cell-compact text-[9px] whitespace-nowrap text-slate-900 bg-amber-50/40 font-bold" title="Fecha y hora de carga de la solicitud">{formatDateTimeDisplay(r.timestampForm)}</td>
                    <td className="cell-compact max-w-[100px] font-bold text-slate-800 truncate" title={r.clientName}>{r.clientName}</td>
                    <td className="cell-compact max-w-[80px] text-[10px] font-bold text-slate-700 truncate" title={r.contractRepre}>{r.contractRepre}</td>
                    <td className="cell-compact font-bold text-slate-700">{r.contract}</td>
                    <td className="cell-compact text-emerald-700 font-medium">{r.product}</td>
                    <td className="cell-compact text-[10px] truncate max-w-[100px]" title={r.contractComprador}>{r.contractComprador}</td>
                    <td className="cell-compact text-[10px] truncate max-w-[100px]" title={r.contractDestino}>{r.contractDestino}</td>
                    <td className="cell-compact text-[9px] whitespace-nowrap bg-slate-50">{formatDateDisplay(r.contractDesde)} al {formatDateDisplay(r.contractHasta)}</td>
                    <td className="cell-compact text-[10px] truncate max-w-[80px]" title={r.contractOrigen}>{r.contractOrigen}</td>
                    <td className="cell-compact text-[10px] truncate max-w-[80px]" title={r.contractTipo}>{r.contractTipo}</td>
                    
                    <td className="cell-compact text-[10px] italic text-slate-500 max-w-[120px] truncate" title={r.observations}>{r.observations || '-'}</td>
                    
                    <td className="cell-compact text-center">
                        <span className="font-bold text-sm px-1.5 text-slate-600">{r.originalQuantity || 0}</span>
                    </td>

                    <td className="cell-compact text-center bg-emerald-50/50">
                        <span className="font-bold text-sm px-1.5 text-emerald-700">{asignado}</span>
                    </td>

                    <td className="cell-compact text-center bg-amber-50/50">
                        <span className={`font-black text-sm px-1.5 ${isFullyRejected ? 'text-slate-400' : 'text-amber-700'}`}>{r.quantity}</span>
                    </td>

                    <td className="cell-compact text-center">
                        {r.rejectedQty > 0 ? (
                            <div className="flex items-center justify-center gap-1 bg-red-100 text-red-800 px-1.5 py-0.5 rounded w-fit mx-auto shadow-sm border border-red-200">
                                <span className="font-bold text-[11px]">{r.rejectedQty}</span>
                                <button onClick={() => onRecover(r.id)} className="text-red-500 hover:text-red-700 bg-white rounded-full p-0.5 shadow-sm transition active:scale-95" title="Recuperar (Deshacer rechazo)">
                                    <Icons.Undo className="w-3 h-3"/>
                                </button>
                            </div>
                        ) : <span className="text-slate-300">-</span>}
                    </td>
                    
                    <td className="cell-compact text-center bg-emerald-50/30 border-l border-emerald-100">
                        {isAnalista && !isFullyRejected && (
                            <button onClick={onAssign} className="bg-emerald-500 hover:bg-emerald-600 text-white p-1.5 rounded shadow-sm transition active:scale-95 flex items-center justify-center mx-auto" title="Distribuir y Asignar Lotes">
                                <Icons.Plus className="w-4 h-4"/>
                            </button>
                        )}
                        {!isAnalista && <span className="text-slate-300">-</span>}
                    </td>
                    
                    <td className="cell-compact text-center bg-red-50/30 border-l border-red-100">
                        {isAnalista && !isFullyRejected && (
                            <div className="flex items-center justify-center gap-1 opacity-40 group-hover:opacity-100 transition focus-within:opacity-100">
                                <input type="number" value={rejectVal} onChange={e => setRejectVal(e.target.value)} className="w-12 text-center border border-red-300 rounded font-bold text-red-800 input-compact outline-none focus:ring-2 focus:ring-red-500 bg-white shadow-inner transition" />
                                <button onClick={() => onReject(r.id, Number(rejectVal))} className="bg-red-500 hover:bg-red-600 text-white p-1 rounded shadow-sm transition active:scale-95" title="Rechazar"><Icons.XCircle className="w-3.5 h-3.5"/></button>
                            </div>
                        )}
                        {!isAnalista && <span className="text-slate-300">-</span>}
                    </td>
                </tr>
            );
        }

        // --- FORMULARIO COMERCIAL ---
        // --- FORMULARIO COMERCIAL ---
        function SalesDashboard({ reloadRequests, clientes = [], currentUser = null, isAnalista = true, destinos = [], intervinientes = [], contratos = [] }) {
            const [header, setHeader] = useState({ client: '', product: '', contractObj: null });
            const [line, setLine] = useState({ date: '', qty: '', obs: '' });
            const [items, setItems] = useState([]);
            const [showModal, setShowModal] = useState(false);

            const productList = ['SOJA', 'MAIZ', 'TRIGO', 'GIRASOL', 'SORGO', 'CEBADA'];
            const compradorList = useMemo(() => [...new Set((intervinientes || []).map(i => i.descripcion).filter(Boolean))].sort(), [intervinientes]);
            const destinoList = useMemo(() => [...new Set((destinos || []).map(d => d.descripcion).filter(Boolean))].sort(), [destinos]);

            // Clientes filtrados por representante
            const clientList = useMemo(() => {
                let list = clientes;
                if (!isAnalista && currentUser) {
                    const mine = (currentUser.nombreCompleto || '').trim().toUpperCase();
                    list = clientes.filter(c => (c.repreComercial || '').trim().toUpperCase() === mine);
                }
                return [...new Set(list.map(c => c.cliente).filter(Boolean))].sort();
            }, [clientes, isAnalista, currentUser]);

            const selectedCliente = useMemo(() => clientes.find(c => c.cliente === header.client) || null, [clientes, header.client]);

            // Normaliza CUIT (deja solo dígitos) para comparar
            const normCuit = (s) => (s || '').toString().replace(/[^0-9]/g, '');

            // Contratos del cliente elegido: match por CUIT del vendedor
            const availableContracts = useMemo(() => {
                if (!selectedCliente) return [];
                const cuitCli = normCuit(selectedCliente.cuit);
                if (!cuitCli) return [];
                let list = contratos.filter(c => normCuit(c.cuitVendedor) === cuitCli && c.kgFalta > 0);
                if (header.product) {
                    list = list.filter(c => (c.producto || '').trim().toUpperCase().startsWith((header.product || '').trim().toUpperCase().slice(0,4)));
                }
                return list;
            }, [contratos, selectedCliente, header.product]);

            const addLine = (e) => {
                e.preventDefault();
                if(!line.date || !line.qty) return;
                setItems([...items, { id: Date.now() + Math.random(), date: line.date, qty: line.qty, obs: line.obs }]);
                setLine({ date: '', qty: '', obs: '' });
            };
            const removeLine = (id) => setItems(items.filter(i => i.id !== id));

            const totalPedido = items.reduce((acc, it) => acc + (Number(it.qty) || 0), 0);

            const sendAll = async () => {
                if (!header.client || !header.contractObj || items.length === 0) return alert("Faltá completar Cliente, Contrato y al menos un cupo.");
                const co = header.contractObj;
                if (co.contrato === 'SIN CONTRATO') {
                    if (!co.comprador || !co.destino || !co.producto) return alert("Para SIN CONTRATO, completá Producto, Comprador y Destino.");
                } else {
                    // Validación de kg: el total pedido no puede superar lo que falta entregar
                    const kgPorCupo = 30000; // referencia: 1 cupo ≈ 30 tn. Validamos en cantidad de cupos vs kg falta.
                    // Validamos solo si el contrato tiene kg falta > 0
                    if (co.kgFalta && totalPedido * kgPorCupo > co.kgFalta) {
                        const maxCupos = Math.floor(co.kgFalta / kgPorCupo);
                        if (!window.confirm(`Atención: el contrato ${co.contrato} tiene ${co.kgFalta.toLocaleString()} kg pendientes (≈ ${maxCupos} cupos de 30tn). Estás pidiendo ${totalPedido} cupos. ¿Continuar igual?`)) return;
                    }
                }

                try {
                    const repre = (selectedCliente?.repreComercial || currentUser?.nombreCompleto || '').toUpperCase();
                    const records = items.map(item => {
                        const qty = Number(item.qty) || 0;
                        const srid = 'manual:' + Date.now() + ':' + Math.random().toString(36).substring(2, 10);
                        return {
                            source_row_id: srid,
                            timestamp_form: new Date().toISOString(),
                            email_comercial: currentUser?.username || '(manual)',
                            representante: repre,
                            vendedor: header.client || '',
                            producto: (co.producto || header.product || '').toUpperCase(),
                            comprador: (co.comprador || '').toUpperCase(),
                            venta_con_descarga: (co.tipo || '').toLowerCase().includes('c/desc') ? true : ((co.tipo || '').toLowerCase().includes('s/desc') ? false : null),
                            nro_contrato: co.contrato === 'SIN CONTRATO' ? null : (co.contrato || null),
                            destino: (co.destino || '').toUpperCase(),
                            fecha_cupo: item.date || null,
                            cantidad: qty,
                            quantity_remaining: qty,
                            rejected_qty: 0,
                            observaciones: item.obs || null
                        };
                    });
                    const { error } = await sb.from('requests').insert(records);
                    if (error) throw error;
                    setHeader({ client: '', product: '', contractObj: null });
                    setItems([]);
                    if (reloadRequests) reloadRequests();
                    alert("¡Solicitud guardada correctamente!");
                } catch (e) {
                    alert('Error al guardar la solicitud: ' + e.message);
                }
            };

            const co = header.contractObj;

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full max-w-7xl mx-auto">
                    {/* COLUMNA IZQUIERDA: FORMULARIO */}
                    <div className="flex-[2] bg-white rounded-xl shadow border border-slate-200 p-6 space-y-5 overflow-y-auto custom-scroll">
                        <div className="flex justify-between items-center">
                            <h3 className="font-bold text-lg text-emerald-800 flex items-center gap-2">
                                <Icons.Plus className="w-5 h-5"/> Cargar Nueva Solicitud al Tablero
                            </h3>
                        </div>

                        <div className="grid md:grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Cliente</label>
                                <select className="w-full p-2 border rounded-lg bg-slate-50 focus:border-emerald-500 outline-none" value={header.client} onChange={e => setHeader({ client: e.target.value, product: '', contractObj: null })}>
                                    <option value="">Seleccionar...</option>
                                    {clientList.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase">Producto (filtro opcional)</label>
                                <select className="w-full p-2 border rounded-lg bg-slate-50 focus:border-emerald-500 outline-none" value={header.product} onChange={e => setHeader({...header, product: e.target.value, contractObj: null})} disabled={!header.client}>
                                    <option value="">Todos</option>
                                    {productList.map(p=><option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                        </div>

                        {!co ? (
                            <div>
                                <div onClick={()=>{ if(!header.client){ alert('Primero seleccioná un cliente.'); return; } setShowModal(true); }} className={`border-2 border-dashed rounded-xl p-6 text-center transition-all ${header.client ? 'border-slate-300 cursor-pointer hover:border-emerald-400 hover:bg-emerald-50/50 group' : 'border-slate-200 bg-slate-50/50 cursor-not-allowed'}`}>
                                    <div className="flex flex-col items-center gap-2">
                                        <div className={`p-3 rounded-full ${header.client ? 'bg-slate-100 group-hover:bg-emerald-100' : 'bg-slate-100'}`}><Icons.Search className={`w-6 h-6 ${header.client ? 'text-slate-400 group-hover:text-emerald-600' : 'text-slate-300'}`}/></div>
                                        <span className={`text-sm font-bold ${header.client ? 'text-slate-500 group-hover:text-emerald-700' : 'text-slate-400'}`}>Clic aquí para buscar contrato</span>
                                        {!header.client && <span className="text-xs text-slate-400 italic mt-1">Seleccioná un cliente primero.</span>}
                                    </div>
                                </div>
                                {isAnalista && header.client && (
                                    <button onClick={() => {
                                        const today = new Date(); const future = new Date(); future.setDate(today.getDate() + 10);
                                        setHeader({...header, contractObj: { contrato: 'SIN CONTRATO', comprador: '', destino: '', producto: header.product || '', desde: today.toISOString().slice(0,10), hasta: future.toISOString().slice(0,10), kgFalta: 0, tipo: 'S/C', repreVendedor: '' }});
                                    }} className="mt-2 text-xs text-amber-700 bg-amber-50 hover:bg-amber-100 border border-amber-300 px-3 py-1.5 rounded-lg font-bold transition">Cargar SIN CONTRATO (solo analista)</button>
                                )}
                            </div>
                        ) : (
                            <div className={`bg-white rounded-xl border ${co.contrato === 'SIN CONTRATO' ? 'border-amber-300' : 'border-emerald-300'} overflow-hidden relative shadow-md`}>
                                <div className={`${co.contrato === 'SIN CONTRATO' ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'} p-3 border-b flex justify-between items-center`}>
                                    <div className="flex flex-wrap items-center gap-2">
                                        <h4 className={`font-extrabold ${co.contrato === 'SIN CONTRATO' ? 'text-amber-900' : 'text-emerald-900'} text-sm`}>Contrato: {co.contrato}</h4>
                                        {co.contrato === 'SIN CONTRATO'
                                            ? <span className="bg-amber-100 text-amber-800 border border-amber-300 px-2 py-0.5 rounded text-[10px] font-bold uppercase shadow-sm">Sin Contrato</span>
                                            : <span className="bg-emerald-100 text-emerald-800 border border-emerald-300 px-2 py-0.5 rounded text-[10px] font-bold uppercase shadow-sm">{co.kgFalta ? `${co.kgFalta.toLocaleString()} kg pend.` : 'Sin saldo'}</span>}
                                        {(co.cartaGarantia === 'Si') && <span className="bg-yellow-100 text-yellow-800 border border-yellow-300 px-2 py-0.5 rounded text-[10px] font-bold uppercase shadow-sm">⚠️ Carta Garantía</span>}
                                    </div>
                                    <button onClick={()=>{ if(co.contrato==='SIN CONTRATO'){ setHeader({...header, contractObj:null}); } else { setShowModal(true); } }} className={`text-xs ${co.contrato === 'SIN CONTRATO' ? 'text-amber-700 bg-white border border-amber-300 hover:bg-amber-100' : 'text-emerald-700 bg-white border border-emerald-300 hover:bg-emerald-100'} px-2.5 py-1 rounded font-bold transition shadow-sm`}>Cambiar</button>
                                </div>
                                <div className="p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5 text-sm bg-slate-50/50">
                                    <div>
                                        <label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Producto</label>
                                        {co.contrato === 'SIN CONTRATO' ? (
                                            <select className="w-full text-xs p-2 border border-amber-300 rounded-lg bg-white font-bold outline-none focus:ring-2 focus:ring-amber-500" value={co.producto} onChange={e=>setHeader({...header, contractObj:{...co, producto:e.target.value}})}><option value="">Seleccionar...</option>{productList.map(p=><option key={p} value={p}>{p}</option>)}</select>
                                        ) : <div className="font-bold text-slate-700">{co.producto}</div>}
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Comprador</label>
                                        {co.contrato === 'SIN CONTRATO' ? (
                                            <select className="w-full text-xs p-2 border border-amber-300 rounded-lg bg-white font-bold outline-none focus:ring-2 focus:ring-amber-500" value={co.comprador} onChange={e=>setHeader({...header, contractObj:{...co, comprador:e.target.value}})}><option value="">Seleccionar...</option>{compradorList.map(x=><option key={x} value={x}>{x}</option>)}</select>
                                        ) : <div className="font-bold text-slate-700 truncate" title={co.comprador}>{co.comprador}</div>}
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Destino</label>
                                        {co.contrato === 'SIN CONTRATO' ? (
                                            <select className="w-full text-xs p-2 border border-amber-300 rounded-lg bg-white font-bold outline-none focus:ring-2 focus:ring-amber-500" value={co.destino} onChange={e=>setHeader({...header, contractObj:{...co, destino:e.target.value}})}><option value="">Seleccionar...</option>{destinoList.map(x=><option key={x} value={x}>{x}</option>)}</select>
                                        ) : <div className="font-bold text-slate-700 truncate" title={co.destino}>{co.destino}</div>}
                                    </div>
                                    {co.contrato !== 'SIN CONTRATO' && (
                                        <>
                                            <div className="sm:col-span-2">
                                                <label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Entrega</label>
                                                <div className="font-medium text-slate-600 bg-white border border-slate-200 px-3 py-1.5 rounded-lg w-fit shadow-sm">{formatDateDisplay(co.desde)} al {formatDateDisplay(co.hasta)}</div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Kg pendientes</label>
                                                <div className="font-mono font-black text-lg text-emerald-700">{(co.kgFalta||0).toLocaleString()}</div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className={`space-y-3 p-4 bg-slate-50 rounded-xl border border-slate-100 ${!co ? 'opacity-50 pointer-events-none' : ''}`}>
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-2">Agregar Cupos</label>
                            <div className="flex flex-wrap gap-2">
                                <input type="date" className="w-36 p-2 border rounded-lg focus:border-emerald-500 outline-none text-sm bg-white" value={line.date} onChange={e=>setLine({...line, date: e.target.value})}/>
                                <input type="number" placeholder="Cant." className="w-24 p-2 border rounded-lg focus:border-emerald-500 outline-none text-sm bg-white" value={line.qty} onChange={e=>setLine({...line, qty: e.target.value})}/>
                                <input type="text" placeholder="Observaciones..." className="flex-1 min-w-[150px] p-2 border rounded-lg focus:border-emerald-500 outline-none text-sm bg-white" value={line.obs} onChange={e=>setLine({...line, obs: e.target.value})}/>
                                <button onClick={addLine} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 rounded-lg font-bold shadow-sm">Add</button>
                            </div>
                        </div>
                    </div>

                    {/* COLUMNA DERECHA: RESUMEN */}
                    <div className="flex-1 bg-white rounded-xl shadow border border-slate-200 p-5 flex flex-col">
                        <h3 className="font-bold text-emerald-800 mb-3 flex items-center gap-2"><Icons.ListChecks className="w-5 h-5"/> Cupos a solicitar</h3>
                        <div className="flex-1 overflow-y-auto custom-scroll space-y-2 min-h-0">
                            {items.length === 0 && <p className="text-sm text-slate-400 italic text-center py-8">Todavía no agregaste cupos.</p>}
                            {items.map(it => (
                                <div key={it.id} className="flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm">
                                    <div>
                                        <span className="font-bold text-slate-700">{formatDateDisplay(it.date)}</span>
                                        <span className="mx-2 text-emerald-700 font-black">{it.qty} cupos</span>
                                        {it.obs && <span className="text-xs text-slate-400 italic">— {it.obs}</span>}
                                    </div>
                                    <button onClick={()=>removeLine(it.id)} className="text-red-400 hover:text-red-600"><Icons.XCircle className="w-4 h-4"/></button>
                                </div>
                            ))}
                        </div>
                        <div className="border-t border-slate-200 mt-3 pt-3">
                            <div className="flex justify-between text-sm font-bold text-slate-600 mb-3"><span>Total cupos:</span><span className="text-emerald-700">{totalPedido}</span></div>
                            <button onClick={sendAll} disabled={!co || items.length === 0} className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-2.5 rounded-lg transition shadow-sm">Enviar Solicitud</button>
                        </div>
                    </div>

                    {/* MODAL SELECCIÓN DE CONTRATOS */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-6xl flex flex-col overflow-hidden border border-slate-200">
                                <div className="p-4 border-b border-slate-200 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <Icons.Search className="w-5 h-5 text-emerald-600" />
                                        <h3 className="text-lg font-extrabold text-slate-800">Contratos de {header.client}</h3>
                                    </div>
                                    <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-slate-600 transition p-1"><Icons.X className="w-6 h-6" /></button>
                                </div>
                                <div className="overflow-auto custom-scroll max-h-[65vh]">
                                    <table className="w-full text-left text-xs border-collapse">
                                        <thead className="bg-slate-100 sticky top-0 z-10">
                                            <tr>
                                                {['Contrato','Comprador','Producto','Kg pactados','Kg entregados','Kg pendientes','Entrega','Tipo','Destino','Cosecha','Precio',''].map(h=>
                                                    <th key={h} className="p-2 font-bold text-slate-600 border-b border-slate-200 whitespace-nowrap">{h}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {availableContracts.map((c, i) => (
                                                <tr key={c.id || i} className="even:bg-slate-50 hover:bg-emerald-50 transition cursor-pointer group" onClick={()=>{ setHeader({...header, contractObj: { contrato: c.nroContrato, comprador: c.comprador, destino: c.destino, producto: c.producto, desde: c.desde, hasta: c.hasta, kgFalta: c.kgFalta, tipo: c.tipo, cartaGarantia: c.cartaGarantia, repreVendedor: c.repreVendedor } }); setShowModal(false); }}>
                                                    <td className="p-2 border-b border-slate-100 font-bold text-slate-800 whitespace-nowrap">{c.nroContrato}</td>
                                                    <td className="p-2 border-b border-slate-100 max-w-[140px] truncate" title={c.comprador}>{c.comprador}</td>
                                                    <td className="p-2 border-b border-slate-100 font-bold text-emerald-700">{c.producto}</td>
                                                    <td className="p-2 border-b border-slate-100 text-right font-mono">{(c.kilosPactados||0).toLocaleString()}</td>
                                                    <td className="p-2 border-b border-slate-100 text-right font-mono">{(c.kgEntregados||0).toLocaleString()}</td>
                                                    <td className="p-2 border-b border-slate-100 text-right font-mono font-black text-emerald-700">{(c.kgFalta||0).toLocaleString()}</td>
                                                    <td className="p-2 border-b border-slate-100 whitespace-nowrap">{formatDateDisplay(c.desde)} al {formatDateDisplay(c.hasta)}</td>
                                                    <td className="p-2 border-b border-slate-100 whitespace-nowrap">{c.tipo}</td>
                                                    <td className="p-2 border-b border-slate-100 max-w-[120px] truncate" title={c.destino}>{c.destino}</td>
                                                    <td className="p-2 border-b border-slate-100">{c.cosecha}</td>
                                                    <td className="p-2 border-b border-slate-100 whitespace-nowrap">{c.precio} {c.moneda}</td>
                                                    <td className="p-2 border-b border-slate-100"><span className="opacity-0 group-hover:opacity-100 bg-emerald-600 text-white text-[10px] px-2 py-1 rounded font-bold transition">USAR</span></td>
                                                </tr>
                                            ))}
                                            {availableContracts.length === 0 && <tr><td colSpan="12" className="p-8 text-center text-slate-400 italic">No se encontraron contratos con saldo pendiente para este cliente{header.product?` y producto ${header.product}`:''}.<br/><span className="text-[11px]">Verificá que el CUIT del cliente en el ABM coincida con el del contrato, y que se haya importado el Excel de contratos.</span></td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
